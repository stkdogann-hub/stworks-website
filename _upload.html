async function uploadAll() {
    const fileNames = Object.keys(FILES);
    addLog('Starting upload of ' + fileNames.length + ' files...', 'info');
    
    for (const name of fileNames) {
        addLog('Uploading: ' + name + ' (' + Math.round(FILES[name].length * 3/4 / 1024) + ' KB)...', 'info');
        try {
            const resp = await fetch(API + '/' + name, {
                method: 'PUT',
                headers: {
                    'Authorization': 'Bearer ' + TOKEN,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: 'Add ' + name,
                    content: FILES[name],
                    branch: 'main'
                })
            });
            
            if (resp.ok) {
                addLog('OK: ' + name, 'ok');
            } else {
                const err = await resp.json();
                addLog('FAIL: ' + name + ' - ' + resp.status + ' - ' + (err.message || ''), 'err');
            }
        } catch(e) {
            addLog('ERROR: ' + name + ' - ' + e.message, 'err');
        }
    }
    
    addLog('\n=== All uploads complete! ===', 'ok');
    addLog('You can close this tab now.', 'info');
    
    // Signal completion
    window._uploadDone = true;
}

uploadAll();
